name: masari_platform
description: "MASARI PLATFORM - Enterprise production-ready travel, tourism, Hajj, and Umrah platform."
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management & Dependency Injection
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^13.2.0

  # Elegant UI & Icons
  lucide_icons: ^0.321.0
  google_fonts: ^6.1.0
  shimmer: ^3.1.0
  
  # Local persistence
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
